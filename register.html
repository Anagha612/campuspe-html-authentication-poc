<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-lg p-4" style="width: 450px;">
    <h3 class="text-center mb-3">Register</h3>

    <form action="login.html">
      <input type="text" class="form-control mb-3" placeholder="Name" required>
      <input type="email" class="form-control mb-3" placeholder="Email" required>
      <input type="tel" class="form-control mb-3" placeholder="Phone Number" required>
      <input type="password" class="form-control mb-3" placeholder="Password" required>
      <input type="password" class="form-control mb-3" placeholder="Confirm Password" required>

      <button type="submit" class="btn btn-success w-100">Register</button>
    </form>

    <div class="text-center mt-3">
      <a href="login.html">Already have an account?</a>
    </div>
  </div>

</body>
</html>
